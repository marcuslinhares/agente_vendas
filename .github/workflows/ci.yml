name: CI — Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COVERAGE_MIN_PYTHON: 70
  COVERAGE_MIN_TYPESCRIPT: 60

jobs:
  quality-python:
    name: Python Quality (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/fastapi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -q ruff mypy bandit pytest pytest-asyncio pytest-cov radon xenon 2>&1 | tail -3
      - name: 🔴 Lint (Ruff) — MUST PASS
        run: ruff check app/ tests/
      - name: 🔴 Format check (Ruff) — MUST PASS
        run: ruff format --check app/ tests/
      - name: 🟡 Type check (mypy) — non-blocking
        run: mypy app/ --ignore-missing-imports
      - name: 🟡 Security (bandit) — non-blocking
        run: bandit -r app/ -ll -q
      - name: 🔴 Complexity (xenon) — MUST PASS
        run: xenon app/ --max-absolute B --max-modules B --max-average A
      - name: 🔴 Tests + Coverage — MUST PASS
        run: |
          python -m pytest tests/ -v --tb=short --cov=app --cov-fail-under=${{ env.COVERAGE_MIN_PYTHON }} --cov-report=term-missing 2>&1 | tail -30

  quality-typescript:
    name: TypeScript Quality (Hono + NestJS + Web)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentevendas
          POSTGRES_USER: app
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d agentevendas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    strategy:
      matrix:
        app: [hono, nestjs, web]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json
      - run: npm ci 2>&1 | tail -3
      - name: 🔴 TypeScript compile — MUST PASS
        run: npx tsc --noEmit 2>&1
      - name: 🔴 Lint (ESLint) — MUST PASS
        run: npx eslint src/ --ext .ts,.tsx 2>&1
      - name: 🔴 Build — MUST PASS
        run: npm run build 2>&1 | tail -10
      - name: 🔴 Tests + Coverage — MUST PASS
        if: matrix.app == 'nestjs'
        run: |
          DATABASE_URL=postgresql://app:testpass@localhost:5432/agentevendas REDIS_URL=redis://localhost:6379 npx jest --config jest.config.ts --forceExit --coverage --coverageThreshold='{"global":{"branches":60,"functions":60,"lines":60,"statements":60}}' 2>&1 | tail -20

  quality-complexity:
    name: 🔴 Complexity Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check Python complexity
        run: |
          pip install -q radon xenon 2>&1 | tail -1
          echo "=== Cyclomatic complexity (files with score > A) ==="
          radon cc apps/fastapi/app/ -a -s || true
          echo "=== Block complexity gate ==="
          xenon apps/fastapi/app/ --max-absolute B --max-modules B --max-average A

  quality-secrets:
    name: 🔴 Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3.88.17
        with:
          extra_args: --results=verified,unknown --no-fail

  quality-dependencies:
    name: 🟡 Dependency Audit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentevendas
          POSTGRES_USER: app
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d agentevendas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    strategy:
      matrix:
        app: [hono, nestjs, web]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm audit --audit-level=high 2>&1 || echo "⚠️ Vulnerabilities found — review manually"
